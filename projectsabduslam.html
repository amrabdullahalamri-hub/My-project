<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project</title>

    <style>

        body{
            background-color:#ed900f;
            font-family:Tahoma;
            text-align:center;
        }

        div{
            margin-top:30px;
        }

        marquee{
            background-color:#2563eb;
            color:white;
            padding:15px;
            font-size:22px;
            border-radius:10px;
            width:80%;
        }

        video{
            width:500px;
            border-radius:15px;
            margin-top:20px;
            box-shadow:0 0 15px gray;
        }

        form{
            background-color:white;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        label{
            font-size:18px;
            font-weight:bold;
        }

        input{
            width:90%;
            padding:12px;
            margin-top:10px;
            border-radius:10px;
            border:1px solid gray;
            font-size:16px;
        }

        input:focus{
            border-color:#2563eb;
            outline:none;
        }

        button{
            width:95%;
            padding:12px;
            background-color:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background-color:#1d4ed8;
        }

    </style>

</head>

<body>

    <div>

        <marquee>
            اهلا وسهلا بكم في منصة اكادمية اونلاين
        </marquee>

        <br><br>

        <video src="d:\البحر موجود بس يشتي له غواص\Web development\[Arabic] HTML And CSS Design 3 In 2022 in One Video(720P_HD).mp4"  controls width="300px"" controls></video>

    </div>

    <div>

        <form action="indexx.html" method="post">

            <label for="alii">USER_EMAIL</label>
            <br>

            <input
                id="alii"
                type="email"
                placeholder="enter the email"
                required>

            <br><br>

            <label for="asd">PASSWORD</label>
            <br>

            <input
                id="asd"
                type="password"
                placeholder="enter the password"
                required>

            <br><br>

            <button type="submit">
                تسجيل الدخول
            </button>

        </form>

    </div>

</body>
</html>
