<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma;
        }

        body{
            background:linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#1e3a8a;
        }

        label{
            font-size:17px;
            font-weight:bold;
            color:#334155;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:2px solid #cbd5e1;
            border-radius:10px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#2563eb;
            outline:none;
            box-shadow:0 0 10px rgba(37,99,235,0.3);
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:scale(1.02);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>تسجيل البيانات</h1>

        <form action="lab6.html" method="post">

            <label for="asdd">USER_NAME</label>
            <input
                id="asdd"
                type="text"
                placeholder="enter the name"
                required>

            <label for="ut">UNIVERSITY</label>
            <input
                id="ut"
                type="text"
                placeholder="enter the university"
                required>

            <label for="add">CITY</label>
            <input
                id="add"
                type="text"
                placeholder="enter the city"
                required>

            <label for="mn">NUMBER_ID</label>
            <input
                id="mn"
                type="number"
                placeholder="enter the number id"
                required>

            <label for="nam">NUMBER_PHONE</label>
            <input
                id="nam"
                type="number"
                placeholder="enter the number"
                required>

            <button type="submit">
                انتقل الى الخلف
            </button>

        </form>

    </div>

</body>

</html>
